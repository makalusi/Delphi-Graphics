<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Delphi Graphics Official</title>
    <link rel="icon" type="image/jpeg" href="./assets/delphi logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'delphi-blue': '#2563eb',
                        'delphi-cyan': '#00aeef',
                        'delphi-pink': '#ec008c',
                        'delphi-yellow': '#fff200'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-['Montserrat']">
    <div class="max-w-3xl mx-auto px-4 py-12">
        <div class="mb-12 text-center">
            <a href="index.html" class="inline-block mb-6">
                <img src="./assets/delphi logo.jpg" alt="Delphi Graphics" class="h-16">
            </a>
            <h1 class="text-4xl font-bold text-gray-900 mb-2">Checkout</h1>
            <p class="text-gray-500">Review your order details and complete via WhatsApp</p>
        </div>

        <div class="grid grid-cols-1 gap-8">
            <!-- Order Summary -->
            <div class="bg-white rounded-3xl p-8 shadow-xl border border-gray-100">
                <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-delphi-pink" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                    </svg>
                    Order Summary
                </h3>
                <div id="checkout-items" class="space-y-4 mb-6 border-b border-gray-100 pb-6">
                    <!-- Items injected here -->
                </div>
                <div class="flex justify-between items-center text-xl font-bold">
                    <span>Total Amount</span>
                    <span id="checkout-total" class="text-delphi-blue">KSh 0</span>
                </div>
            </div>

            <!-- Customer Info Form -->
            <div class="bg-white rounded-3xl p-8 shadow-xl border border-gray-100">
                <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-delphi-cyan" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                    Delivery Information
                </h3>
                <form id="checkout-form" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="name" placeholder="Full Name" required class="w-full bg-gray-50 border border-gray-200 rounded-xl p-4 focus:ring-2 focus:ring-delphi-cyan outline-none">
                        <input type="tel" id="phone" placeholder="Phone Number" required class="w-full bg-gray-50 border border-gray-200 rounded-xl p-4 focus:ring-2 focus:ring-delphi-cyan outline-none">
                    </div>
                    <input type="text" id="location" placeholder="Office / Building / Area" required class="w-full bg-gray-50 border border-gray-200 rounded-xl p-4 focus:ring-2 focus:ring-delphi-cyan outline-none">
                    <textarea id="notes" placeholder="Any special instructions for design or delivery?" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-4 focus:ring-2 focus:ring-delphi-cyan outline-none h-32"></textarea>
                    
                    <button type="submit" class="w-full bg-gradient-to-r from-delphi-pink to-pink-600 text-white font-bold py-5 rounded-2xl shadow-lg hover:shadow-pink-500/30 transition-all text-lg flex items-center justify-center gap-3 mt-6">
                        Complete via WhatsApp
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                        </svg>
                    </button>
                    <p class="text-center text-xs text-gray-400 mt-4 px-8">No payment happens here. We will receive your order and contact you via WhatsApp for design proofs and payment details.</p>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cartItems = JSON.parse(localStorage.getItem('delphi_cart')) || [];
            const container = document.getElementById('checkout-items');
            const totalElement = document.getElementById('checkout-total');
            let total = 0;

            if (cartItems.length === 0) {
                window.location.href = 'index.html';
                return;
            }

            cartItems.forEach(item => {
                const itemPrice = parseInt(item.price.replace(/[^\d]/g, '')) || 0;
                const itemTotal = itemPrice * (item.quantity || 1);
                total += itemTotal;

                container.innerHTML += `
                    <div class="flex items-center justify-between py-2">
                        <div class="flex items-center gap-3">
                            <span class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-xs font-bold text-gray-500">${item.quantity}x</span>
                            <div>
                                <h4 class="font-bold text-sm text-gray-900">${item.title}</h4>
                                <p class="text-[10px] text-gray-400 uppercase tracking-wider">${item.category}</p>
                            </div>
                        </div>
                        <span class="text-sm font-bold text-gray-900">KSh ${itemTotal.toLocaleString()}</span>
                    </div>
                `;
            });

            totalElement.innerText = `KSh ${total.toLocaleString()}`;

            // Handle Submission
            document.getElementById('checkout-form').addEventListener('submit', (e) => {
                e.preventDefault();
                
                const name = document.getElementById('name').value;
                const phone = document.getElementById('phone').value;
                const location = document.getElementById('location').value;
                const notes = document.getElementById('notes').value;
                
                // Build Message
                let message = `*DELPHI GRAPHICS - NEW ORDER*%0A`;
                message += `---------------------------%0A`;
                message += `*Customer:* ${name}%0A`;
                message += `*Phone:* ${phone}%0A`;
                message += `*Location:* ${location}%0A%0A`;
                
                message += `*ITEMS:*%0A`;
                cartItems.forEach(item => {
                    message += `• ${item.quantity}x ${item.title} - KSh ${(parseInt(item.price.replace(/[^\d]/g, '')) * item.quantity).toLocaleString()}%0A`;
                });
                
                message += `%0A*TOTAL: KSh ${total.toLocaleString()}*%0A%0A`;
                if (notes) message += `*NOTES:* ${notes}%0A`;
                message += `---------------------------%0A`;
                message += `_This order was generated from your website._`;

                const waLink = `https://wa.me/25420069883?text=${message}`;
                
                // Clear cart
                localStorage.removeItem('delphi_cart');
                
                // Redirect safely to WhatsApp deep link (avoids popup blockers)
                window.location.href = waLink;
            });
        });
    </script>
</body>
</html>
